name: Build, Test & Publish Wheels

on:
  push:
    branches:
      - release
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/workflows/README.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - release
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.id }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            runs_on: ubuntu-latest
            cibw_archs_linux: x86_64
            artifact_name: wheels-linux-x86_64

          - id: linux-aarch64
            runs_on: ubuntu-24.04-arm
            cibw_archs_linux: aarch64
            artifact_name: wheels-linux-aarch64

          - id: macos-arm64
            runs_on: macos-14
            artifact: wheels-macos-arm64
            artifact_name: wheels-macos14-aarch64


    env:
      ROCKSDB_VERSION: "10.7.5"
      PYREX_VERSION: "0.2.0a"

      # Your existing global cibuildwheel knobs
      CIBW_FORCE_INSTALL: "1"
      CIBW_DEBUG: "1"
      CIBW_PRERELEASE_PYTHONS: "True"

      # Build selection (from ARM workflow; keep if you want same set on x86)
      CIBW_SKIP: "pp*"
      CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"

      # Host cache from your original workflow
      HOST_CACHE_DIR: "/tmp/cibw_cache"

      # ARM portable baseline flags (used only in ARM build step)
      PORTABLE_FLAGS: "-O3 -march=armv8-a -mtune=generic -flto"

      # Pin images for ARM (used only in ARM build step)
      CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"
      CIBW_MUSLLINUX_AARCH64_IMAGE: "musllinux_1_2"

      # macos settings
      MACOS_HOST_CACHE_DIR: "/Users/runner/cibw-build-cache"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX: do NOT force x64; let runner arch decide (works on ARM + x86)
      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel

        # --- macOS Specific Steps ---
      - name: Install RocksDB (macOS speciffic)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install rocksdb
      - name: Get Homebrew prefix (macOS)
        if: runner.os == 'macOS'
        # Set BREW_PREFIX as an environment variable that cibuildwheel will pick up
        run: echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
        shell: bash

      - name: Cache cibuildwheel artifacts (Linux host cache)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ${{ env.HOST_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-cibw-cache-RocksDB-${{ env.ROCKSDB_VERSION }}

      - name: Cache cibuildwheel artifacts (MacOS)
        if: runner.os == 'macOS'
        id: cache-cibw-macos
        uses: actions/cache@v4
        with:
          path: ${{ env.MACOS_HOST_CACHE_DIR }}
          # The key should combine OS, Python version, and a hash of the build dependencies.
          key: ${{ runner.os }}-${{ runner.arch }}-cibw-cache-RocksDB-${{ env.ROCKSDB_VERSION }}

      # ARM-only: RocksDB build cache (your .tar.gz store)
      - name: Cache RocksDB builds (ARM)
        if: matrix.cibw_archs_linux == 'aarch64'
        uses: actions/cache@v4
        with:
          path: .cibw-rocksdb-cache
          key: >-
            rocksdb-${{ runner.os }}-linux-arch=${{ matrix.cibw_archs_linux }}-v=${{ env.ROCKSDB_VERSION }}
            -manylinux=${{ env.CIBW_MANYLINUX_AARCH64_IMAGE }}-musllinux=${{ env.CIBW_MUSLLINUX_AARCH64_IMAGE }}
            -flags=${{ env.PORTABLE_FLAGS }}
          restore-keys: |
            rocksdb-${{ runner.os }}-linux-arch=${{ matrix.cibw_archs_linux }}-v=${{ env.ROCKSDB_VERSION }}-

      # -----------------------
      # Build wheels (non-ARM)
      # -----------------------
      - name: Build wheels (non-ARM)
        if: matrix.cibw_archs_linux != 'aarch64'
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs_linux }}
          CIBW_ENVIRONMENT: >-
            PYREX_VERSION='${{ env.PYREX_VERSION }}'
            ROCKSDB_VERSION='${{ env.ROCKSDB_VERSION }}'
        run: cibuildwheel --output-dir wheelhouse



      # -----------------------
      # Build wheels (ARM)
      # -----------------------
      - name: Build wheels (ARM aarch64)
        if: matrix.cibw_archs_linux == 'aarch64'
        env:
          CIBW_ARCHS_LINUX: "aarch64"

          # Use docker and mount cache directory into container
          CIBW_CONTAINER_ENGINE: "docker; create-args: --network=host -v ${{ github.workspace }}/.cibw-rocksdb-cache:/cibw-cache"

          # Make sure these are present in the container env
          CIBW_ENVIRONMENT: >-
            PYREX_VERSION='${{ env.PYREX_VERSION }}'
            ROCKSDB_VERSION='${{ env.ROCKSDB_VERSION }}'
            PORTABLE_FLAGS='${{ env.PORTABLE_FLAGS }}'
            MAX_JOBS="$(nproc)"
            CMAKE_BUILD_PARALLEL_LEVEL="$(nproc)"
            CFLAGS="${{ env.PORTABLE_FLAGS }}"
            CXXFLAGS="${{ env.PORTABLE_FLAGS }}"
            LDFLAGS="-flto"
            CC=clang
            CXX=clang++
            CMAKE_PREFIX_PATH="/opt/rocksdb"
            CPPFLAGS="-I/opt/rocksdb/include $CPPFLAGS"
            LDFLAGS="-L/opt/rocksdb/lib $LDFLAGS"
            LD_LIBRARY_PATH="/opt/rocksdb/lib:$LD_LIBRARY_PATH"
            PKG_CONFIG_PATH="/opt/rocksdb/lib/pkgconfig:$PKG_CONFIG_PATH"
          CIBW_BEFORE_ALL_LINUX: |
            set -euxo pipefail
            ARCH="aarch64"
            PREFIX="/opt/rocksdb"
            FLAGS="${PORTABLE_FLAGS}"
            # Separate caches for glibc (manylinux) vs musl (musllinux)
            if [ -f /etc/alpine-release ]; then
              LIBC="musl"
              IMAGE_TAG="${CIBW_MUSLLINUX_AARCH64_IMAGE:-musllinux_unknown}"
            else
              LIBC="glibc"
              IMAGE_TAG="${CIBW_MANYLINUX_AARCH64_IMAGE:-manylinux_unknown}"
            fi
            SAFE_FLAGS="$(echo "${FLAGS}" | tr ' /' '__')"


            # Install deps (to make downstream code consistent, because clang is forced it is installed here - otherwise there is a failure)
            if [ "${LIBC}" = "musl" ]; then
              apk add --no-cache \
                bash build-base clang clang-dev cmake git ninja \
                gflags-dev snappy-dev lz4-dev zlib-dev bzip2-dev zstd-dev \
                liburing-dev linux-headers wget tar
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                clang cmake build-essential ninja-build wget tar \
                libgflags-dev libsnappy-dev liblz4-dev zlib1g-dev \
                libbz2-dev libzstd-dev liburing-dev
            else
              (command -v dnf >/dev/null 2>&1 && dnf install -y \
                 clang gcc-c++ make cmake ninja-build wget tar \
                 gflags-devel snappy-devel lz4-devel zlib-devel bzip2-devel \
                 libzstd-devel liburing-devel) || \
              (yum install -y epel-release && yum install -y \
                 clang gcc-c++ make cmake ninja-build wget tar \
                 gflags-devel snappy-devel lz4-devel zlib-devel bzip2-devel \
                 libzstd-devel liburing-devel)
            fi

            CACHE_TARBALL="/cibw-cache/rocksdb-v${ROCKSDB_VERSION}-${ARCH}-${LIBC}-${IMAGE_TAG}-flags-${SAFE_FLAGS}.tar.gz"
            if [ -f "${CACHE_TARBALL}" ]; then
              echo "✅ Restoring cached RocksDB from ${CACHE_TARBALL}"
              mkdir -p "${PREFIX}"
              tar -xzf "${CACHE_TARBALL}" -C /
              ldconfig || true
              exit 0
            fi

            echo "ℹ️ No cache found. Building RocksDB and caching..."

            WORKDIR="$(mktemp -d)"
            cd "${WORKDIR}"
            wget -q "https://github.com/facebook/rocksdb/archive/refs/tags/v${ROCKSDB_VERSION}.tar.gz"
            tar -xzf "v${ROCKSDB_VERSION}.tar.gz"
            cd "rocksdb-${ROCKSDB_VERSION}"
            export CC=clang
            export CXX=clang++
            cmake . -G Ninja \
              -DCMAKE_C_COMPILER=clang \
              -DCMAKE_CXX_COMPILER=clang++ \
              -DPORTABLE=1 \
              -DWITH_SNAPPY=1 \
              -DWITH_LZ4=1 \
              -DWITH_ZLIB=1 \
              -DWITH_ZSTD=1 \
              -DWITH_TOOLS=OFF \
              -DWITH_TESTS=OFF \
              -DWITH_BENCHMARK_TOOLS=OFF \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
              -DCMAKE_C_FLAGS="${FLAGS}" \
              -DCMAKE_CXX_FLAGS="${FLAGS} -Wno-error=unused-command-line-argument -Wno-error=nontrivial-memcall" \
              -DCMAKE_EXE_LINKER_FLAGS="-flto" \
              -DCMAKE_SHARED_LINKER_FLAGS="-flto"
            ninja -j"$(nproc)"
            ninja install
            ldconfig || true
            echo "📦 Saving RocksDB cache to ${CACHE_TARBALL}"
            tar -czf "${CACHE_TARBALL}" -C / "opt/rocksdb"
        run: cibuildwheel --output-dir wheelhouse

      - name: Build wheels
        if: runner.os == 'macOS'
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./wheelhouse/*.whl

  test_wheels:
    name: Test wheels (${{ matrix.id }}, py${{ matrix.python-version }})
    needs: build_wheels
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        id: [linux-x86_64, linux-aarch64]
        python-version: ["3.9","3.10","3.11","3.12"]
        include:
          - id: linux-x86_64
            runs_on: ubuntu-latest
            artifact_name: wheels-linux-x86_64
          - id: linux-aarch64
            runs_on: ubuntu-24.04-arm
            artifact_name: wheels-linux-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Install wheel and run tests
        shell: bash
        run: |
          set -euxo pipefail

          PY_VERSION="${{ matrix.python-version }}"
          VERSION_TAG="${PY_VERSION//./}"

          echo "Python version: $PY_VERSION"
          echo "Runner arch: ${{ runner.arch }}"
          ls -R dist/

          # Ubuntu == glibc, so choose manylinux (NOT musllinux)
          WHEEL="$(ls dist/*-cp${VERSION_TAG}-cp${VERSION_TAG}-manylinux_*.whl | head -n 1 || true)"

          if [ -z "${WHEEL}" ]; then
            echo "No manylinux wheel found for cp${VERSION_TAG}."
            echo "Available wheels:"
            ls -1 dist/
            exit 1
          fi

          echo "Installing wheel: ${WHEEL}"
          pip install --force-reinstall "${WHEEL}"

          pytest tests/

  publish_to_pypi:
    name: Publish wheels to PyPI
    needs: test_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Verify wheels
        run: |
          ls -R dist/

      - name: Publish to PyPI
        run: |
          twine upload --non-interactive dist/**/*.whl

